<script>
  (function() {
    const saved = localStorage.getItem('polar_theme');
    const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

</script>
</head>
<body class="page-fade-in">

<button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" style="position:fixed;top:16px;right:60px;z-index:50;"><i class="fas fa-moon" id="themeIcon"></i></button>
<button class="theme-toggle-btn lang-toggle-btn" onclick="toggleLang()" style="position:fixed;top:16px;right:16px;z-index:50;"><span class="lang-toggle-label">EN</span></button>

<div class="auth-wrap">

  <!-- ===== LOGIN CARD ===== -->
  <div class="auth-card" id="loginCard">
    <div class="auth-avatar"><i class="fas fa-user"></i></div>
    <h2 data-i18n="login_title">LOGIN</h2>
    <p class="sub" data-i18n="login_subtitle">Masuk ke akun Polar.web.id kamu</p>

    <div class="auth-error" id="loginError"></div>

    <form id="loginForm">
      <div class="auth-field">
        <label data-i18n="login_email_label">Email</label>
        <input type="email" id="loginEmail" placeholder="email@gmail.com" data-i18n-placeholder="login_email_placeholder" required>
      </div>
      <div class="auth-field">
        <label data-i18n="login_password_label">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" data-i18n-placeholder="login_password_placeholder" required>
      </div>
      <div class="cf-turnstile" id="turnstileLogin" data-sitekey="{{TURNSTILE_SITE_KEY}}" data-theme="auto" style="margin-bottom:14px;"></div>
      <div class="privacy-check">
        <input type="checkbox" id="loginPrivacyCheck">
        <label for="loginPrivacyCheck"><span data-i18n="login_privacy_check">Saya udah baca &amp; setuju sama</span> <a href="/privacy" target="_blank" data-i18n="privacy_label">Kebijakan Privasi</a> Polar.web.id</label>
      </div>
      <button type="submit" class="btn btn-orange btn-full" id="loginBtn">
        <i class="fas fa-right-to-bracket"></i> <span data-i18n="login_btn">LOGIN</span>
      </button>
    </form>

    <div class="auth-divider" data-i18n="login_or">ATAU</div>

    <a href="/api/auth/google" class="google-btn-login" id="googleLoginBtn">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="g-icon"><img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google"></div>
        <div>
          <div style="font-size:14px;font-weight:900;" data-i18n="login_google_btn">Login dengan Google</div>
          <div style="font-size:11px;font-weight:500;color:var(--text-muted);" data-i18n="login_google_sub">Aman & cepat</div>
        </div>
      </div>
      <i class="fas fa-chevron-right" style="color:#111;"></i>
    </a>

    <div class="auth-switch"><span data-i18n="login_switch_text">Belum punya akun?</span> <a href="#" onclick="showRegister();return false;" data-i18n="login_switch_link">Daftar di sini</a></div>
  </div>

  <!-- ===== REGISTER CARD ===== -->
  <div class="auth-card" id="registerCard" style="display:none;">
    <div class="auth-avatar"><i class="fas fa-user-plus"></i></div>
    <h2 data-i18n="register_title">DAFTAR</h2>
    <p class="sub" data-i18n="register_subtitle">Buat akun Polar.web.id baru pakai email</p>

    <div class="auth-error" id="registerError"></div>

    <form id="registerForm">
      <div class="auth-field">
        <label data-i18n="register_name_label">Nama</label>
        <input type="text" id="regName" placeholder="Nama kamu" data-i18n-placeholder="register_name_placeholder" required>
      </div>
      <div class="auth-field">
        <label data-i18n="register_email_label">Email</label>
        <input type="email" id="regEmail" placeholder="email@gmail.com" data-i18n-placeholder="login_email_placeholder" required>
      </div>
      <div class="auth-field">
        <label data-i18n="register_password_label">Password</label>
        <input type="password" id="regPassword" placeholder="Minimal 6 karakter" data-i18n-placeholder="register_password_placeholder" minlength="6" required>
      </div>
      <div class="cf-turnstile" id="turnstileRegister" data-sitekey="{{TURNSTILE_SITE_KEY}}" data-theme="auto" style="margin-bottom:14px;"></div>
      <div class="privacy-check">
        <input type="checkbox" id="regPrivacyCheck">
        <label for="regPrivacyCheck"><span data-i18n="login_privacy_check">Saya udah baca &amp; setuju sama</span> <a href="/privacy" target="_blank" data-i18n="privacy_label">Kebijakan Privasi</a> Polar.web.id</label>
      </div>
      <button type="submit" class="btn btn-orange btn-full" id="registerBtn">
        <i class="fas fa-user-plus"></i> <span data-i18n="register_btn">DAFTAR</span>
      </button>
    </form>

    <div class="auth-divider" data-i18n="login_or">ATAU</div>

    <a href="/api/auth/google" class="google-btn-login" id="googleRegisterBtn">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="g-icon"><img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google"></div>
        <div>
          <div style="font-size:14px;font-weight:900;" data-i18n="register_google_btn">Daftar dengan Google</div>
          <div style="font-size:11px;font-weight:500;color:var(--text-muted);" data-i18n="login_google_sub">Aman & cepat</div>
        </div>
      </div>
      <i class="fas fa-chevron-right" style="color:#111;"></i>
    </a>

    <div class="auth-switch"><span data-i18n="register_switch_text">Sudah punya akun?</span> <a href="#" onclick="showLogin();return false;" data-i18n="register_switch_link">Login di sini</a></div>
  </div>

</div>

<div style="text-align:center;padding:0 20px 24px;display:flex;flex-direction:column;gap:8px;align-items:center;">
  <a href="https://wa.me/6285715294026" target="_blank" style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:800;color:#111;text-decoration:none;border:var(--border-thick);box-shadow:var(--shadow-light);padding:6px 16px;background:#fff;">
    <i class="fab fa-whatsapp" style="color:var(--green);"></i> <span data-i18n="cs_label">Customer Service</span>
  </a>
  <a href="/privacy" style="font-size:11px;font-weight:600;color:var(--text-muted);text-decoration:underline;" data-i18n="privacy_label">Kebijakan Privasi</a>
</div>

<div class="toast" id="toast"></div>

<script>
window.addEventListener('load', () => {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
});

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('polar_theme', 'light'); }
  else { document.documentElement.setAttribute('data-theme', 'dark'); localStorage.setItem('polar_theme', 'dark'); }
  document.getElementById('themeIcon').className = isDark ? 'fas fa-moon' : 'fas fa-sun';
}
document.getElementById('themeIcon').className = document.documentElement.getAttribute('data-theme') === 'dark' ? 'fas fa-sun' : 'fas fa-moon';

function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.style.display = 'block';
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => { t.style.display = 'none'; }, 4000);
}

function showRegister() {
  document.getElementById('loginCard').style.display = 'none';
  document.getElementById('registerCard').style.display = 'block';
}
function showLogin() {
  document.getElementById('registerCard').style.display = 'none';
  document.getElementById('loginCard').style.display = 'block';
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}
function hideError(id) {
  document.getElementById(id).classList.remove('show');
}

// Cek query string buat error dari Google OAuth callback
(function checkGoogleError() {
  const params = new URLSearchParams(window.location.search);
  const error = params.get('error');
  if (error) {
    const messages = {
      no_code: 'Login Google dibatalkan atau gagal.',
      google_failed: 'Gagal terhubung ke Google. Coba lagi.',
      server_error: 'Terjadi kesalahan server. Coba lagi.'
    };
    showToast('❌ ' + (messages[error] || 'Login Google gagal.'), 'error');
    history.replaceState(null, '', window.location.pathname);
  }
})();

// ===== REFERRAL: tangkep ?ref=KODE dari URL, simpen buat dipakai pas register =====
(function captureReferralCode() {
  const params = new URLSearchParams(window.location.search);
  const ref = params.get('ref');
  if (ref) {
    localStorage.setItem('polar_ref_code', ref);
    showToast('🎁 Kamu diundang! Daftar sekarang buat dapet bonus koin.', 'gold');
    showRegister();
  }
  const savedRef = localStorage.getItem('polar_ref_code');
  if (savedRef) {
    document.getElementById('googleLoginBtn').href = '/api/auth/google?ref=' + encodeURIComponent(savedRef);
    document.getElementById('googleRegisterBtn').href = '/api/auth/google?ref=' + encodeURIComponent(savedRef);
  }
})();

// ===== LOGIN =====
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError('loginError');
  const btn = document.getElementById('loginBtn');
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const captchaToken = document.querySelector('#turnstileLogin [name="cf-turnstile-response"]')?.value || '';

  if (!document.getElementById('loginPrivacyCheck').checked) {
    showError('loginError', 'Kamu harus centang persetujuan Kebijakan Privasi dulu');
    return;
  }

  btn.disabled = true;

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password, captchaToken })
    });
    const data = await res.json();
    if (!data.success) {
      showError('loginError', data.message || 'Login gagal');
      if (window.turnstile) turnstile.reset();
      return;
    }
    showToast('✅ Login berhasil!', 'success');
    setTimeout(() => window.location.href = '/dashboard', 600);
  } catch (err) {
    showError('loginError', 'Koneksi gagal, coba lagi.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-right-to-bracket"></i> LOGIN';
  }
});

// ===== REGISTER =====
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError('registerError');
  const btn = document.getElementById('registerBtn');
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const captchaToken = document.querySelector('#turnstileRegister [name="cf-turnstile-response"]')?.value || '';

  if (password.length < 6) {
    showError('registerError', 'Password minimal 6 karakter');
    return;
  }

  if (!document.getElementById('regPrivacyCheck').checked) {
    showError('registerError', 'Kamu harus centang persetujuan Kebijakan Privasi dulu');
    return;
  }

  btn.disabled = true;

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ name, email, password, captchaToken, privacyAccepted: true, referralCode: localStorage.getItem('polar_ref_code') || null })
    });
    const data = await res.json();
    if (!data.success) {
      showError('registerError', data.message || 'Daftar gagal');
      if (window.turnstile) turnstile.reset();
      return;
    }
    showToast('✅ Akun berhasil dibuat!', 'success');
    localStorage.removeItem('polar_ref_code');
    setTimeout(() => window.location.href = '/dashboard', 600);
  } catch (err) {
    showError('registerError', 'Koneksi gagal, coba lagi.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-user-plus"></i> DAFTAR';
  }
});
</script>
</body>
</html>
